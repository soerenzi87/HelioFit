
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>HelioFit AI - Your Intelligent Health Assistant</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            /* Support for iPhone safe areas */
            padding-bottom: env(safe-area-inset-bottom);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes splash-in {
            0% { transform: scale(0.8) rotate(-5deg); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.1) rotate(5deg); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1) rotate(3deg); opacity: 1; }
        }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes splash-exit {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); pointer-events: none; }
        }

        .animate-splash {
            animation: splash-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-splash-exit {
            animation: splash-exit 0.8s cubic-bezier(0.7, 0, 0.84, 0) forwards;
        }

        .animate-fade-in-up {
            opacity: 0;
            animation: fade-in-up 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Better touch feedback */
        button:active {
            transform: scale(0.97);
        }

        /* Custom scrollbar for desktop while keeping mobile clean */
        @media (min-width: 1024px) {
            .custom-scrollbar::-webkit-scrollbar {
                width: 6px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                background: transparent;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: #e2e8f0;
                border-radius: 10px;
            }
        }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
